<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Waglo</title>
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 999999;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 220px;
        height: 220px;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/waglo_definitivo.svg" alt="Waglo" />
    </div>
    <div id="root"></div>
    <script>
      setTimeout(function() {
        var s = document.getElementById('splash');
        s.classList.add('hide');
        setTimeout(function() { s.remove(); }, 650);
      }, 2500);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
